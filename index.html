<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Markup Project - Git Blame Society</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <nav class="sidebar-menu">
                <!-- My librari-ი? -->
                <div class="my-library">
                    <a href="#">
                        <img src="assets/sidebar svg files/Frame library.svg" alt="library item">
                        <span>My Library</span>
                    </a>

                </div>
                <!-- ნაიგაციის ჩამონათვალი-->
                <div class="navigation">
                    <ul class="navigation-list">
                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/Vector pin.svg" alt="pin item">
                                <span>pins</span>
                                <img src="assets/sidebar svg files/Frame arrow pin.svg" alt="arrow pin">
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/icon playlist.svg" alt="icon playlist">
                                <span>Playlists</span>
                                <img src="assets/sidebar svg files/Vector arrow playlist.svg" alt="vector arrow">
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/Vector heart like song.svg" alt="heart icon">
                                <span>Liked songs</span>
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/Vector saves.svg" alt="saves icon">
                                <span>Saves</span>
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/vector albums.svg" alt="album icon">
                                <span>Albums</span>
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/vector folders.svg" alt="artist icon">
                                <span>Folders</span>
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/vector podcast.svg" alt="podcast icon">
                                <span>Podcasts</span>
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/Vector audiobook.svg" alt="audiobook icon">
                                <span>Audiobooks</span>
                            </a>
                        </li>

                        <li>
                            <a href="#">
                                <img src="assets/sidebar svg files/Frame artists.svg" alt="artists icon">
                                <span>Artists</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <main class="content">
            <header class="top-header">

            </header>
        </main>
        <footer class="player-bar"></footer>
    </div>
</body>

</html>
